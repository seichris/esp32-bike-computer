name: Map Platform Image

on:
  push:
    paths:
      - ".github/workflows/map-platform-image.yml"
      - "backend/**"
      - "OSM_Extract/conf/**"
      - "OSM_Extract/scripts/**"
      - "config/map-stream-trust.json"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  publish:
    name: Publish worker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: image
        name: Build and publish immutable image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/open-bike-computer-map-platform:${{ github.sha }}
          provenance: mode=max
          sbom: true

      - name: Attest image provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/open-bike-computer-map-platform
          subject-digest: ${{ steps.image.outputs.digest }}
          push-to-registry: true

      - name: Record immutable deployment reference
        env:
          IMAGE_DIGEST: ${{ steps.image.outputs.digest }}
        run: |
          echo "ghcr.io/${GITHUB_REPOSITORY_OWNER}/open-bike-computer-map-platform@${IMAGE_DIGEST}" >> "$GITHUB_STEP_SUMMARY"
